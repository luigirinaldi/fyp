on: [push, pull_request]

name: CI / Cargo Build & Parallel Tests

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions-rs/toolchain@v1
        with:
          profile: minimal
          toolchain: stable
          override: true

      - name: Cargo build
        uses: actions-rs/cargo@v1
        with:
          command: build
          args: --release

      # Upload target directory as artifact (v4)
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: cargo-target
          path: target
          retention-days: 1

  test-validate:
    name: Benchmark validation
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions-rs/toolchain@v1
        with:
          profile: minimal
          toolchain: stable
          override: true

      # Download build artifacts (v4)
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: cargo-target
          path: target

      # Rebuild again just because the tests are generated during the build step
      - name: Cargo build
        uses: actions-rs/cargo@v1
        with:
          command: build
          args: --release

      - name: Run validation
        uses: actions-rs/cargo@v1
        with:
          command: test
          args: --release validate

  test-equiv:
    name: Test equivalence
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions-rs/toolchain@v1
        with:
          profile: minimal
          toolchain: stable
          override: true

      # Download build artifacts (v4)
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: cargo-target
          path: target

      # Rebuild again just because the tests are generated during the build step
      - name: Cargo build
        uses: actions-rs/cargo@v1
        with:
          command: build
          args: --release

      - name: Run equivalence finding
        uses: actions-rs/cargo@v1
        with:
          command: test
          args: --release find_equiv
