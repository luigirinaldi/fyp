on: [push, pull_request]

name: CI/ Cargo Tests

jobs:
  check:
    name: Check
    jobs:
      runs-on: ubuntu-latest
      steps:
        - uses: actions/checkout@v2
        - uses: actions-rs/toolchain@v1
          with:
            profile: minimal
            toolchain: stable
            override: true
        - uses: actions-rs/cargo@v1
          with:
            command: check
  test:
    name: Test
    jobs:
      runs-on: ubuntu-latest
      steps:
        - uses: actions/checkout@v2
        - uses: actions-rs/toolchain@v1
          with:
            profile: minimal
            toolchain: stable
            override: true
        - uses: actions-rs/cargo@v1
          with:
            command: test

